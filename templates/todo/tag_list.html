{% extends "base.html" %}


{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">Tags</h2>
  <ul class="list-group">
    {% for tag in tag_list %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        {{ tag.name }}
        <div>
          <a href="{% url 'todo:tag_update' tag.id %}" class="btn btn-sm btn-warning me-2">Edit</a>
          <a href="{% url 'todo:tag_delete' tag.id %}" class="btn btn-sm btn-danger">Delete</a>
        </div>
      </li>
    {% empty %}
      <li class="list-group-item text-center">No tags available.</li>
    {% endfor %}
  </ul>
  <div class="mt-3">
    <a href="{% url 'todo:tag_create' %}" class="btn btn-primary">Add New Tag</a>
  </div>
</div>
{% endblock %}
