{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>Task Form</h1>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'todo:task_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
